<!DOCTYPE html>
<html>
<head>
<title>ToolKeet Bot Test</title>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}
#chat{
height:400px;
overflow:auto;
border:1px solid cyan;
padding:20px;
margin-bottom:20px;
}
input{
width:70%;
padding:12px;
}
button{
padding:12px 20px;
background:cyan;
border:none;
cursor:pointer;
}
.msg{
margin:10px 0;
}
.user{
color:cyan;
}
.bot{
color:lime;
}
</style>
</head>
<body>

<h1>ToolKeet AI Test</h1>

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<script>

const chat=document.getElementById("chat");

function add(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.innerHTML="<b>"+type+":</b> "+text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

async function sendMsg(){

const input=document.getElementById("msg");

const text=input.value;

if(!text)return;

add(text,"user");

input.value="";

try{

const response=await fetch(
"http://127.0.0.1:3000/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
}
);

const data=await response.json();

add(data.reply,"bot");

}catch(err){

add("Connection Error","bot");

console.error(err);

}

}

</script>

</body>
</html>
